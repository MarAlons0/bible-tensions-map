<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bible Tensions Map{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">Bible Tensions Map</a>
    <div class="nav-links">
      <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Heatmap</a>
      <a href="/biplot" {% if request.path == '/biplot' %}class="active"{% endif %}>Biplot</a>
      <a href="/conduct" {% if request.path == '/conduct' %}class="active"{% endif %}>Conduct</a>
      <a href="/timeline" {% if request.path == '/timeline' %}class="active"{% endif %}>Timeline</a>
      <a href="/wordcloud" {% if request.path == '/wordcloud' %}class="active"{% endif %}>Word Cloud</a>
      <a href="/about" {% if request.path == '/about' %}class="active"{% endif %}>About</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/tensions.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
